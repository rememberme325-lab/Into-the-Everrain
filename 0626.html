  <title>永雨長征｜Into the Everrain</title>
  <style>
    /* FOT-TsukuAOldMin Pr6N L：Adobe Fonts 與本機安裝字體的共同入口 */
    @font-face {
      font-family: "TsukuAOldMin Local";
      src:
        local("FOT-TsukuAOldMin Pr6N L"),
        local("FOT-TsukuAOldMin Pr6N"),
        local("TsukuAOldMin Pr6N L");
      font-style: normal;
      font-weight: 300;
      font-display: swap;
    }

    :root {
      --night: #0b1018;
      --ink: #e9dfc8;
      --muted: #b7ac98;
      --gold: #c8a96a;
      --gold-bright: #e6cb8d;
      --silver: #9bb0c2;
      --line: rgba(225, 204, 154, 0.22);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      --serif: fot-tsukuaoldmin-pr6n, "TsukuAOldMin Local", "FOT-TsukuAOldMin Pr6N L", "Noto Serif TC", "Songti TC", "PMingLiU", "Microsoft JhengHei", serif;
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--night); scroll-behavior: smooth; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink); font-family: var(--serif); font-style: normal; font-weight: 300; font-synthesis: weight; overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(96,112,146,.15), transparent 34%),
        radial-gradient(circle at 85% 88%, rgba(104,66,72,.12), transparent 36%),
        linear-gradient(145deg, #090d14, #111725 55%, #090d14);
    }
    button { font: inherit; }
    .world { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .world::before {
      content:""; position:absolute; inset:-15%;
      background:
        radial-gradient(circle at 30% 20%, rgba(199,179,128,.06), transparent 24%),
        radial-gradient(circle at 65% 68%, rgba(126,151,170,.08), transparent 25%);
      filter: blur(12px); animation: mistMove 20s ease-in-out infinite alternate;
    }
    .world::after {
      content:""; position:absolute; inset:0;
      background: linear-gradient(to bottom, transparent 58%, rgba(0,0,0,.45)), radial-gradient(circle at 50% 45%, transparent 34%, rgba(0,0,0,.28) 100%);
    }
    @keyframes mistMove { from { transform: translate3d(-2%,-1%,0) scale(1); } to { transform: translate3d(3%,2%,0) scale(1.08); } }
    .rain {
      position:absolute; inset:-100px 0 0; opacity:.24;
      background-image: repeating-linear-gradient(104deg, transparent 0 28px, rgba(180,202,218,.22) 29px 30px, transparent 31px 58px);
      background-size:120px 180px; animation:rainFall 1.1s linear infinite; transform:skewX(-8deg);
    }
    .rain.far { opacity:.1; background-size:190px 260px; animation-duration:1.8s; filter:blur(.4px); }
    @keyframes rainFall { from { background-position:0 -180px; } to { background-position:0 180px; } }
    .ember { position:absolute; width:3px; height:3px; border-radius:50%; background:rgba(230,203,141,.7); box-shadow:0 0 12px rgba(230,203,141,.45); animation:floatEmber var(--duration) ease-in-out infinite; animation-delay:var(--delay); left:var(--left); bottom:-10px; opacity:0; }
    @keyframes floatEmber { 0%{transform:translateY(0);opacity:0} 20%{opacity:.75} 100%{transform:translateY(-110vh) translateX(30px);opacity:0} }
    .app { position:relative; z-index:2; min-height:100vh; display:grid; place-items:center; padding:30px 16px 44px; }
    .shell { width:min(980px,100%); }
    .topbar { display:none; align-items:center; gap:14px; margin:0 auto 14px; padding:0 4px; }
    .chapter-count { color:var(--muted); font-size:13px; letter-spacing:.18em; white-space:nowrap; }
    .road { position:relative; flex:1; height:10px; border:1px solid rgba(225,204,154,.17); background:rgba(255,255,255,.03); border-radius:999px; overflow:hidden; }
    .road::before { content:""; position:absolute; inset:3px 8px; border-top:1px dashed rgba(225,204,154,.18); }
    .road-fill { position:absolute; inset:0 auto 0 0; width:0%; background:linear-gradient(90deg, rgba(160,181,198,.42), rgba(230,203,141,.78)); box-shadow:0 0 18px rgba(230,203,141,.22); transition:width .55s ease; border-radius:inherit; }
    .panel {
      position:relative; overflow:hidden; min-height:590px; padding:clamp(26px,5vw,54px);
      border:1px solid var(--line); border-radius:28px;
      background:linear-gradient(160deg, rgba(255,255,255,.038), transparent 34%), linear-gradient(180deg, rgba(18,23,34,.91), rgba(10,14,22,.93));
      box-shadow:var(--shadow); backdrop-filter:blur(18px); animation:panelIn .55s ease both;
    }
    .panel::before { content:""; position:absolute; inset:14px; border:1px solid rgba(225,204,154,.08); border-radius:20px; pointer-events:none; }
    .panel::after { content:""; position:absolute; width:250px; height:250px; right:-125px; bottom:-125px; border-radius:50%; border:1px solid rgba(225,204,154,.10); box-shadow:0 0 0 32px rgba(225,204,154,.025),0 0 0 64px rgba(225,204,154,.012); pointer-events:none; }
    @keyframes panelIn { from{opacity:0;transform:translateY(12px) scale(.992)} to{opacity:1;transform:none} }
    .fade-out { animation:panelOut .26s ease forwards; }
    @keyframes panelOut { to{opacity:0;transform:translateY(-8px) scale(.992)} }
    .sigil { width:86px; height:86px; display:grid; place-items:center; margin-bottom:22px; border-radius:50%; color:#22190e; font-size:36px; background:radial-gradient(circle at 35% 28%, #f3ddb0, #c4a368 58%, #6b4f2d 100%); box-shadow:inset 0 0 0 4px rgba(62,40,19,.25),0 12px 34px rgba(0,0,0,.32),0 0 28px rgba(230,203,141,.12); }
    .eyebrow { display:flex; align-items:center; gap:9px; margin-bottom:13px; color:var(--gold-bright); font-size:12px; letter-spacing:.22em; text-transform:uppercase; }
    .eyebrow::before { content:"✦"; letter-spacing:0; opacity:.75; }
    h1,h2,h3,p{margin-top:0} h1{margin-bottom:18px;font-size:clamp(42px,8vw,76px);line-height:1.05;letter-spacing:.06em;text-shadow:0 6px 24px rgba(0,0,0,.25)}
    h2{margin-bottom:15px;font-size:clamp(28px,4.8vw,45px);line-height:1.28;letter-spacing:.035em} h3{font-size:20px;letter-spacing:.04em}

    /* ===== Version 2 typography ===== */
    h1, h2, h3,
    .question-kicker,
    .choice-title,
    .result-title,
    .result-name,
    .result-section h3 {
      font-family: var(--serif);

    }

    .subtitle,
    .story,
    .question-copy,
    .choice-desc,
    .transition-copy,
    .loading-text,
    .result-section p,
    .near-tie {
      font-family: var(--serif);

      font-weight: 300;
    }
    .subtitle{margin-bottom:28px;color:var(--muted);font-size:17px;line-height:1.9;letter-spacing:.025em}
    .story{position:relative;z-index:1;max-width:760px;color:var(--muted);font-size:16px;line-height:2;letter-spacing:.025em}.story p{margin-bottom:14px}
    .incantation{margin:25px 0 28px;padding:17px 20px;border-left:2px solid rgba(230,203,141,.58);background:linear-gradient(90deg,rgba(230,203,141,.065),transparent);color:#e7dbc4;font-size:15px;line-height:2;font-style:italic}
    .primary,.secondary,.choice{border:1px solid rgba(225,204,154,.26);color:var(--ink);cursor:pointer;transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease}
    .primary,.secondary{position:relative;z-index:1;border-radius:14px;padding:14px 20px}.primary{color:#20170d;font-weight:700;background:linear-gradient(135deg,#ecd49d,#c5a260);border-color:transparent;box-shadow:0 10px 28px rgba(0,0,0,.22)}.secondary{background:rgba(255,255,255,.03)}
    .primary:hover,.secondary:hover,.choice:hover{transform:translateY(-2px);border-color:rgba(230,203,141,.65);box-shadow:0 12px 28px rgba(0,0,0,.24)}.primary:hover{background:linear-gradient(135deg,#f5dfaa,#d1ae67)}
    .primary:focus-visible,.secondary:focus-visible,.choice:focus-visible{outline:3px solid rgba(230,203,141,.38);outline-offset:3px}
    .question-kicker{margin-bottom:12px;color:var(--silver);font-size:13px;letter-spacing:.16em}.question-copy{max-width:760px;margin-bottom:22px;color:var(--muted);font-size:16px;line-height:1.9}
    .choices{position:relative;z-index:1;display:grid;gap:12px}.choice{width:100%;min-height:96px;display:grid;grid-template-columns:44px 1fr;align-items:start;gap:15px;padding:18px 20px;text-align:left;border-radius:17px;background:linear-gradient(145deg,rgba(255,255,255,.045),rgba(255,255,255,.018))}
    .choice-mark{width:40px;height:40px;display:grid;place-items:center;border:1px solid rgba(230,203,141,.28);border-radius:50%;color:var(--gold-bright);background:rgba(0,0,0,.13);font-weight:700}.choice-title{display:block;margin:1px 0 6px;font-size:17px;font-weight:700}.choice-desc{display:block;color:var(--muted);font-size:14px;line-height:1.72}.choice.selected{border-color:rgba(230,203,141,.82);background:linear-gradient(145deg,rgba(200,169,106,.16),rgba(155,176,194,.07));transform:scale(.99)}
    .transition-scene{min-height:480px;display:grid;align-content:center;justify-items:center;text-align:center}.transition-icon{margin-bottom:22px;color:var(--gold-bright);font-size:48px;filter:drop-shadow(0 0 18px rgba(230,203,141,.18));animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:.72}50%{transform:scale(1.06);opacity:1}}
    .transition-copy{max-width:600px;color:var(--muted);font-size:17px;line-height:2}.loading-lines{min-height:190px;display:grid;place-items:center;text-align:center}.loading-text{color:var(--gold-bright);font-size:17px;letter-spacing:.08em;animation:loadingFade 1.45s ease-in-out infinite}@keyframes loadingFade{0%,100%{opacity:.35}50%{opacity:1}}
    .result-hero{position:relative;z-index:1;display:grid;grid-template-columns:124px 1fr;gap:24px;align-items:center;margin-bottom:26px}.result-emblem{width:116px;height:116px;display:grid;place-items:center;border-radius:28px;border:1px solid rgba(230,203,141,.22);background:linear-gradient(145deg,rgba(200,169,106,.18),rgba(155,176,194,.08)),rgba(255,255,255,.025);font-size:52px;box-shadow:inset 0 0 34px rgba(255,255,255,.02)}
    .result-region{margin-bottom:7px;color:var(--gold-bright);font-size:13px;letter-spacing:.18em}.result-title{margin-bottom:8px}.result-name{color:var(--silver);font-size:15px;letter-spacing:.09em}.result-section{position:relative;z-index:1;margin-top:26px;padding-top:23px;border-top:1px solid rgba(225,204,154,.13)}.result-section h3{color:var(--gold-bright);margin-bottom:12px}.result-section p{color:var(--muted);font-size:15px;line-height:1.92}
    .tags{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:9px;margin-top:24px}.tag{padding:8px 12px;border:1px solid rgba(225,204,154,.18);border-radius:999px;color:var(--gold-bright);background:rgba(255,255,255,.028);font-size:13px}.near-tie{position:relative;z-index:1;margin-top:24px;padding:15px 17px;border-left:3px solid rgba(155,176,194,.55);border-radius:0 12px 12px 0;color:#c9c3b8;background:rgba(155,176,194,.07);font-size:14px;line-height:1.75}

    @media(max-width:720px){.app{padding:16px 10px 28px;place-items:start center}.panel{min-height:auto;padding:28px 19px;border-radius:21px}.panel::before{inset:9px;border-radius:15px}.story,.question-copy{font-size:15px}.choice{grid-template-columns:38px 1fr;gap:12px;padding:16px}.choice-mark{width:36px;height:36px}.result-hero{grid-template-columns:1fr}.result-emblem{width:92px;height:92px;font-size:43px}.chapter-count{font-size:11px}}


    /* ===== Mobile-first reading and touch refinements ===== */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      color-scheme: dark;
    }

    body {
      min-height: 100svh;
      min-height: 100dvh;
      overflow-wrap: anywhere;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      min-height: 100svh;
      min-height: 100dvh;
      padding-top: max(30px, env(safe-area-inset-top));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-bottom: max(44px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
    }

    .panel,
    .topbar {
      -webkit-backdrop-filter: blur(18px);
    }

    .primary,
    .secondary,
    .choice {
      min-height: 48px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .choice:disabled {
      cursor: default;
    }

    /* Standard phone portrait */
    @media (max-width: 720px) {
      .app {
        display: block;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-right: max(10px, env(safe-area-inset-right));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        padding-left: max(10px, env(safe-area-inset-left));
      }

      .shell {
        width: 100%;
      }

      .topbar {
        position: sticky;
        top: max(6px, env(safe-area-inset-top));
        z-index: 20;
        gap: 10px;
        margin-bottom: 10px;
        padding: 9px 11px;
        border: 1px solid rgba(225, 204, 154, .12);
        border-radius: 14px;
        background: rgba(10, 14, 22, .78);
        box-shadow: 0 8px 24px rgba(0,0,0,.22);
      }

      .chapter-count {
        font-size: 11px;
        letter-spacing: .12em;
      }

      .road {
        height: 9px;
      }

      .panel {
        min-height: calc(100svh - 82px);
        min-height: calc(100dvh - 82px);
        padding: clamp(22px, 6vw, 30px) clamp(17px, 5vw, 24px);
        border-radius: 20px;
        overflow: hidden;
      }

      .panel::before {
        inset: 8px;
        border-radius: 14px;
      }

      .panel::after {
        width: 190px;
        height: 190px;
        right: -110px;
        bottom: -110px;
      }

      .sigil {
        width: 72px;
        height: 72px;
        margin-bottom: 18px;
        font-size: 30px;
      }

      .eyebrow {
        gap: 7px;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: .15em;
        line-height: 1.5;
      }

      h1 {
        margin-bottom: 14px;
        font-size: clamp(38px, 13vw, 58px);
        line-height: 1.08;
      }

      h2 {
        margin-bottom: 13px;
        font-size: clamp(25px, 7.6vw, 34px);
        line-height: 1.35;
      }

      h3 {
        font-size: 18px;
        line-height: 1.45;
      }

      .subtitle {
        margin-bottom: 22px;
        font-size: 15px;
        line-height: 1.8;
      }

      .story,
      .question-copy,
      .result-section p {
        font-size: 15px;
        line-height: 1.88;
      }

      .story p {
        margin-bottom: 12px;
      }

      .incantation {
        margin: 20px 0 23px;
        padding: 14px 15px;
        font-size: 14px;
        line-height: 1.9;
      }

      .question-kicker {
        margin-bottom: 9px;
        font-size: 12px;
        letter-spacing: .12em;
      }

      .question-copy {
        margin-bottom: 18px;
      }

      .choices {
        gap: 10px;
      }

      .choice {
        min-height: 78px;
        grid-template-columns: 36px minmax(0, 1fr);
        gap: 11px;
        padding: 15px 14px;
        border-radius: 15px;
      }

      .choice-mark {
        width: 34px;
        height: 34px;
        font-size: 14px;
      }

      .choice-title {
        margin-bottom: 5px;
        font-size: 16px;
        line-height: 1.45;
      }

      .choice-desc {
        font-size: 13.5px;
        line-height: 1.65;
      }

      .transition-scene {
        min-height: calc(100svh - 130px);
        min-height: calc(100dvh - 130px);
        padding: 18px 2px;
      }

      .transition-icon {
        margin-bottom: 18px;
        font-size: 42px;
      }

      .transition-copy,
      .loading-text {
        font-size: 15px;
        line-height: 1.9;
      }

      .loading-lines {
        min-height: 150px;
      }

      .result-hero {
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
      }

      .result-emblem {
        width: 78px;
        height: 78px;
        border-radius: 20px;
        font-size: 38px;
      }

      .result-region {
        font-size: 11px;
        letter-spacing: .13em;
      }

      .result-name {
        font-size: 14px;
      }

      .result-section {
        margin-top: 22px;
        padding-top: 19px;
      }

      .tags {
        gap: 7px;
        margin-top: 20px;
      }

      .tag {
        padding: 7px 10px;
        font-size: 12px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 25px;
      }

      .primary,
      .secondary {
        width: 100%;
        min-height: 50px;
        padding: 13px 16px;
      }

      .footer {
        margin-top: 10px;
        padding-bottom: env(safe-area-inset-bottom);
        font-size: 9px;
        letter-spacing: .13em;
      }
    }

    /* Extra-narrow phones */
    @media (max-width: 380px) {
      .panel {
        padding-right: 15px;
        padding-left: 15px;
      }

      .choice {
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 9px;
        padding: 14px 12px;
      }

      .choice-mark {
        width: 31px;
        height: 31px;
      }

      .choice-title {
        font-size: 15px;
      }

      .choice-desc {
        font-size: 13px;
      }

      .result-hero {
        grid-template-columns: 1fr;
      }
    }

    /* Phone landscape: reduce vertical chrome and use the width */
    @media (orientation: landscape) and (max-height: 560px) {
      .app {
        display: block;
        padding-top: max(7px, env(safe-area-inset-top));
        padding-right: max(10px, env(safe-area-inset-right));
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        padding-left: max(10px, env(safe-area-inset-left));
      }

      .shell {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: max(4px, env(safe-area-inset-top));
        z-index: 20;
        margin-bottom: 7px;
        padding: 7px 10px;
        border: 1px solid rgba(225, 204, 154, .12);
        border-radius: 12px;
        background: rgba(10, 14, 22, .82);
      }

      .panel {
        min-height: calc(100svh - 64px);
        min-height: calc(100dvh - 64px);
        padding: 20px 24px;
        border-radius: 18px;
      }

      .panel::before {
        inset: 7px;
        border-radius: 12px;
      }

      .sigil {
        width: 58px;
        height: 58px;
        margin-bottom: 12px;
        font-size: 25px;
      }

      h1 {
        font-size: clamp(36px, 7vw, 52px);
      }

      h2 {
        font-size: clamp(24px, 4vw, 32px);
      }

      .subtitle,
      .story,
      .question-copy {
        font-size: 14px;
        line-height: 1.75;
      }

      .incantation {
        margin: 15px 0 18px;
        padding: 11px 14px;
        line-height: 1.7;
      }

      .choice {
        min-height: 74px;
        padding: 13px 14px;
      }

      .transition-scene {
        min-height: calc(100svh - 90px);
        min-height: calc(100dvh - 90px);
        padding: 12px 0;
      }

      .transition-copy {
        font-size: 14px;
        line-height: 1.75;
      }

      .loading-lines {
        min-height: 105px;
      }

      .result-hero {
        grid-template-columns: 80px 1fr;
        gap: 16px;
        margin-bottom: 18px;
      }

      .result-emblem {
        width: 76px;
        height: 76px;
        font-size: 36px;
      }

      .result-section {
        margin-top: 18px;
        padding-top: 16px;
      }

      .footer {
        display: none;
      }
    }

    /* Wider landscape phones can show the three answers side-by-side. */
    @media (orientation: landscape) and (max-height: 560px) and (min-width: 700px) {
      .choices {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: stretch;
        gap: 10px;
      }

      .choice {
        min-width: 0;
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 9px;
        align-content: start;
        padding: 13px 12px;
      }

      .choice-mark {
        width: 30px;
        height: 30px;
        font-size: 13px;
      }

      .choice-title {
        font-size: 15px;
        line-height: 1.4;
      }

      .choice-desc {
        font-size: 12.5px;
        line-height: 1.55;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .primary:hover,
      .secondary:hover,
      .choice:hover {
        transform: none;
        box-shadow: none;
      }

      .choice.selected {
        transform: scale(.99);
      }
    }



    /* ===== Final psychological result page ===== */
    .result-preface {
      position: relative;
      z-index: 1;
      margin: 0 0 28px;
      padding: 18px 20px;
      border-left: 2px solid rgba(155,176,194,.52);
      background: linear-gradient(90deg,rgba(155,176,194,.075),transparent);

 {chapter:"第三日・啟程以前",title:"有重量的紀念",record:"gift",copy:"回程以前，你來到最後一座驛站。守燈人沒有詢問地圖將你帶往何處，只指向桌上三件為遠行者準備的贈禮。『旅途已經給了你一件沒有重量的事物。』他說，『現在，你還可以帶走一件真正放得進行囊的東西。』",question:"你會將哪一件紀念帶回長明城？",options:[
  {title:"星砂金墨禮匣",desc:"深色墨液裡懸著細碎金砂，每一筆都會在燈下微微閃爍。它適合寫下少數重要的句子或寄給珍視之人的信；多年以後再次提筆，你或許仍會想起贈予它的人",result:"星砂金墨禮匣"},
  {title:"沉夜長書墨",desc:"這瓶墨沒有金砂，也沒有華麗匣裝，只有濃厚、飽滿而穩定的色澤。它能陪你寫完長信、日記與尚未完成的故事，在往後平凡的日子裡一頁頁留下痕跡",result:"沉夜長書墨"},
  {title:"暮銀掌石",desc:"一枚被歲月磨得溫潤的深色奇石，大小恰好能藏進掌心。它會慢慢記住持有者的習慣，使往後那些細碎而繁複的事，都變得更輕省、更從容",result:"暮銀掌石"}]}
];
const panel=document.getElementById("panel"),topbar=document.getElementById("topbar"),chapterCount=document.getElementById("chapterCount"),roadFill=document.getElementById("roadFill");
let index=0,scores={mist:0,lantern:0,crimson:0},answers=[],specialAnswers={sweet:"",gift:""};
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function animateReplace(fn){panel.classList.add("fade-out");setTimeout(()=>{panel.classList.remove("fade-out");fn();window.scrollTo({top:0,behavior:"smooth"})},240)}
function renderIntro(){topbar.style.display="none";panel.innerHTML=`<div class="sigil">☂</div><div class="eyebrow">Into the Everrain</div><h1>永雨長征</h1><div class="story"><p>雨已經下了十三日。</p><p>長明城的鐘塔仍如往常一般，在黎明、正午與深夜敲響。鐘聲穿過屋瓦與長街，催促人們推開門扉、點亮燭臺、完成尚未結束的差事。</p><p>你記得每一道命令，沒有遺漏任何承諾；你將別人的憂慮妥善收起，也把自己的疲憊藏在不會被發現的地方。</p><p>直到某一個沒有鐘聲的清晨，你在沉默裡聽見一道極輕的聲音。它似乎來自城牆之外，又彷彿來自某個被你遺忘許久的地方。</p><p>於是，你解下腰間最沉重的幾枚徽記，只帶了三日所需的行囊，走向長明城的北門。</p><div class="incantation">不必詢問道路將通往何處。<br>只需誠實選擇，你願意如何前行。<br>三日之後，地圖自會顯現答案。</div></div><button class="primary" id="startBtn">越過城門</button>`;document.getElementById("startBtn").addEventListener("click",()=>{index=0;scores={mist:0,lantern:0,crimson:0};answers=[];specialAnswers={sweet:"",gift:""};renderOpeningTransition()})}
function renderOpeningTransition(){
  topbar.style.display="none";
  animateReplace(()=>{
    panel.innerHTML=`<div class="transition-scene"><div class="transition-icon">◇</div><div class="transition-copy"><p>北門在你身後緩慢闔上。</p><p>鐘聲穿過雨幕，逐漸退向遠方。</p><p>當你再次低頭時，那張沒有終點的地圖，已在掌中亮起第一道銀線。</p></div></div>`;
    setTimeout(()=>animateReplace(renderQuestion),6800);
  });
}

function renderQuestion(){
  topbar.style.display="flex";
  chapterCount.textContent=`足跡 ${index+1}／${questions.length}`;
  roadFill.style.width=`${((index+1)/questions.length)*100}%`;

  const q=questions[index],opts=shuffle(q.options);

  panel.innerHTML=`<div class="eyebrow">${q.chapter}</div><div class="question-kicker">${q.title}</div><h2>${q.question}</h2><p class="question-copy">${q.copy}</p><div class="choices">${opts.map((o,i)=>`<button class="choice" data-score="${o.score||""}" data-points="${o.points||0}" data-record="${q.record||""}" data-result="${o.result||o.title}"><span class="choice-mark">${String.fromCharCode(65+i)}</span><span><span class="choice-title">${o.title}</span><span class="choice-desc">${o.desc}</span></span></button>`).join("")}</div>`;

  panel.querySelectorAll(".choice").forEach(btn=>btn.addEventListener("click",()=>{
    const target=btn.dataset.score;
    const points=Number(btn.dataset.points||0);
    const record=btn.dataset.record;
    const result=btn.dataset.result;

    panel.querySelectorAll(".choice").forEach(b=>b.disabled=true);
    btn.classList.add("selected");

    if(target&&Object.prototype.hasOwnProperty.call(scores,target)){
      scores[target]+=points;
      answers.push(target);
    }else if(record){
      specialAnswers[record]=result;
    }

    setTimeout(()=>{
      if(index<questions.length-1)renderTransition(index);
      else renderMapReveal();
    },250);
  },{once:true}));
}
function renderTransition(i){const s=transitions[i];animateReplace(()=>{panel.innerHTML=`<div class="transition-scene"><div class="transition-icon">${s.icon}</div><div class="transition-copy">${s.html}</div></div>`;setTimeout(()=>{index+=1;animateReplace(renderQuestion)},7500)})}
function getRanking(){return Object.entries(scores).sort((a,b)=>b[1]-a[1])}
function determineWinner(){const ranking=getRanking(),highest=ranking[0][1],tied=ranking.filter(([,v])=>v===highest).map(([k])=>k);let winner=ranking[0][0];if(tied.length>1){const last=answers[answers.length-1];if(tied.includes(last))winner=last;else if(tied.includes(answers[0]))winner=answers[0]}return{winner,ranking,tied:tied.length>1||ranking[0][1]-ranking[1][1]<=1}}
function renderMapReveal(){topbar.style.display="none";animateReplace(()=>{panel.innerHTML=`<div class="transition-scene"><div class="transition-icon">✦</div><div class="transition-copy"><p>三日將盡。</p><p>你走過的道路沒有消失。</p><p>它們已化作河流、城牆、山脈與潮汐，留在這張地圖之上。</p><p>地圖從未替你選擇終點。</p><p>它只是記住了，當無人催促時，你曾如何選擇自己。</p></div><div class="loading-lines"><div class="loading-text" id="loadingText">雨正在洗去道路上多餘的痕跡……</div></div></div>`;const lines=["雨正在洗去道路上多餘的痕跡……","地圖正在辨認你留下的足印……","遠方的領地正在顯露輪廓……","你的終點即將浮現……"];let i=0;const el=document.getElementById("loadingText"),timer=setInterval(()=>{i+=1;if(i<lines.length)el.textContent=lines[i];else{clearInterval(timer);setTimeout(()=>animateReplace(renderResult),500)}},1050)})}

let preparedResultFile=null,preparedResultUrl="",resultImagePreparing=false;

function clearPreparedResultImage(){
  if(preparedResultUrl){
    URL.revokeObjectURL(preparedResultUrl);
  }
  preparedResultFile=null;
  preparedResultUrl="";
  resultImagePreparing=false;
}

function safeImageFilename(value){
  return String(value).replace(/[\\/:*?"<>|]/g,"-").replace(/\s+/g,"-");
}

function canvasToPngBlob(canvas){
  return new Promise((resolve,reject)=>{
    canvas.toBlob(blob=>{
      if(blob)resolve(blob);
      else reject(new Error("無法建立 PNG 圖片"));
    },"image/png",1);
  });
}

async function prepareResultImage(p){
  const button=document.getElementById("saveImageBtn");
  const hint=document.getElementById("saveHint");
  if(!button||resultImagePreparing)return;

  resultImagePreparing=true;
  clearPreparedResultImage();
  resultImagePreparing=true;
  button.disabled=true;
  button.textContent="正在抄錄卷冊…";
  if(hint){hint.style.display="block";hint.textContent="正在將完整結果頁轉為圖片，請稍候。";}

  try{
    if(typeof html2canvas!=="function"){
      throw new Error("圖片工具尚未載入");
    }

    if(document.fonts&&document.fonts.ready){
      await document.fonts.ready;
    }

    await new Promise(resolve=>{
      requestAnimationFrame(()=>requestAnimationFrame(resolve));
    });

    panel.classList.add("capture-mode");

    const preferredScale=Math.min(2,Math.max(1.35,window.devicePixelRatio||1));
    const maxCanvasHeight=14000;
    const heightSafeScale=maxCanvasHeight/Math.max(panel.scrollHeight,1);
    const captureScale=Math.max(1,Math.min(preferredScale,heightSafeScale));
    const canvas=await html2canvas(panel,{
      backgroundColor:"#0b1018",
      scale:captureScale,
      useCORS:true,
      allowTaint:false,
      logging:false,
      imageTimeout:15000,
      removeContainer:true,
      foreignObjectRendering:false,
      onclone:clonedDocument=>{
        const clonedPanel=clonedDocument.getElementById("panel");
        if(clonedPanel){
          clonedPanel.classList.remove("fade-out");
          clonedPanel.classList.add("capture-mode");
          clonedPanel.style.animation="none";
          clonedPanel.style.transform="none";
          clonedPanel.style.opacity="1";
          clonedPanel.style.overflow="visible";
        }
        clonedDocument.querySelectorAll('[data-html2canvas-ignore="true"]').forEach(element=>element.remove());
      }
    });

    panel.classList.remove("capture-mode");

    const blob=await canvasToPngBlob(canvas);
    preparedResultFile=new File(
      [blob],
      `Into-the-Everrain-${safeImageFilename(p.title)}.png`,
      {type:"image/png"}
    );
    preparedResultUrl=URL.createObjectURL(blob);

    button.disabled=false;
    button.textContent="圖片準備完成";
    if(hint){
      hint.textContent="";
      hint.style.display="none";
    }
  }catch(error){
    panel.classList.remove("capture-mode");
    console.error(error);
    button.disabled=false;
    button.textContent="重新抄錄卷冊";
    if(hint)hint.textContent="圖片製作失敗。請確認網路連線後再點一次。";
  }finally{
    resultImagePreparing=false;
  }
}

function downloadPreparedResultImage(button,hint){
  if(!preparedResultFile||!preparedResultUrl)return;

  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
    (navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);

  if(isIOS){
    const opened=window.open(preparedResultUrl,"_blank");
    if(opened){
      button.textContent="再次開啟圖片";
      if(hint){
        hint.style.display="block";
        hint.textContent="圖片已開啟。請長按圖片，再選擇「儲存到照片」。";
      }
      return;
    }
  }

  const link=document.createElement("a");
  link.href=preparedResultUrl;
  link.download=preparedResultFile.name;
  link.rel="noopener";
  document.body.appendChild(link);
  link.click();
  link.remove();

  if(hint){
    hint.textContent=isIOS
      ?"圖片已開啟或下載。請長按圖片，選擇「儲存到照片」。"
      :"圖片已下載；可在下載項目中開啟，並移至相簿。";
  }
  button.textContent="再次下載圖片";
}

async function savePreparedResultImage(p,button){
  const hint=document.getElementById("saveHint");

  if(!preparedResultFile){
    await prepareResultImage(p);
    if(!preparedResultFile)return;
  }

  const fileShareData={
    title:"永雨長征｜Into the Everrain",
    files:[preparedResultFile]
  };

  try{
    if(
      navigator.share&&
      navigator.canShare&&
      navigator.canShare({files:[preparedResultFile]})
    ){
      await navigator.share(fileShareData);
      button.textContent="再次儲存圖片";
      if(hint){
        hint.textContent="";
        hint.style.display="none";
      }
      return;
    }

    downloadPreparedResultImage(button,hint);
  }catch(error){
    if(error&&error.name==="AbortError"){
      button.textContent="儲存結果圖片";
      if(hint){hint.textContent="";hint.style.display="none";}
      return;
    }

    console.error(error);
    downloadPreparedResultImage(button,hint);
  }
}

function renderResult(){
  const out=determineWinner(),p=places[out.winner];
  const tie=out.tied?`<div class="near-tie">地圖的銀線曾在兩條道路之間短暫分岔。你所需要的療癒並不只有一種模樣；此刻顯現的力量，只是你在最後幾步中稍微更靠近的方向。</div>`:"";
  const sweet=specialAnswers.sweet||"尚未留下甜味";
  const gift=specialAnswers.gift||"尚未選擇紀念";
  const sweetText=sweetImprints[sweet]||"地圖尚未記下這份甜味。";
  const giftText=giftImprints[gift]||"地圖尚未記下這件紀念。";

  clearPreparedResultImage();

  panel.innerHTML=`
    <div class="result-hero">
      <div class="result-emblem">${p.emblem}</div>
      <div>
        <div class="result-region">你的潛意識療癒方式是——</div>
        <h2 class="result-title">${p.power}</h2>
        <div class="result-name">旅人稱號・${p.name}</div>
        <div class="result-destination">地圖終點・${p.title}</div>
      </div>
    </div>

    <div class="story">
      ${p.analysis.map(x=>`<p>${x}</p>`).join("")}
    </div>

    <div class="result-section">
      <h3>這份力量提醒你</h3>
      ${p.reminder.map(x=>`<p>${x}</p>`).join("")}
    </div>

    <div class="result-section">
      <h3>旅程留下的三枚印記</h3>
      <p class="imprint-intro">地圖除了顯示你的療癒方式，也記住了你在旅途中最自然靠近的事物。</p>
      <div class="imprint-grid">
        <div class="imprint-card">
          <div class="imprint-label">道路之印</div>
          <div class="imprint-value">${p.title}</div>
          <p>${p.road}</p>
        </div>
        <div class="imprint-card">
          <div class="imprint-label">行囊之印</div>
          <div class="imprint-value">${gift}</div>
          <p>${giftText}</p>
        </div>
        <div class="imprint-card">
          <div class="imprint-label">味覺之印</div>
          <div class="imprint-value">${sweet}</div>
          <p>${sweetText}</p>
        </div>
      </div>
    </div>

    ${tie}

    <div class="result-section">
      <h3>你的療癒關鍵字</h3>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div>

    <div class="actions" data-html2canvas-ignore="true">
      <button class="primary" id="restartBtn">重新展開地圖</button>
      <button class="secondary" id="saveImageBtn">抄錄至卷冊</button>
    </div>
    <p class="save-hint" id="saveHint" data-html2canvas-ignore="true" style="display:none"></p>
  `;

  document.getElementById("restartBtn").addEventListener("click",()=>{
    clearPreparedResultImage();
    animateReplace(renderIntro);
  });

  const saveImageButton=document.getElementById("saveImageBtn");
  saveImageButton.addEventListener("click",()=>savePreparedResultImage(p,saveImageButton));

}
renderIntro();
</script>
</body>
